<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brave Rewards</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="container">
      <h1>Brave Rewards</h1>
      <nav>
        <a href="#dashboard">Dashboard</a>
        <a href="#history">History</a>
        <a href="#settings">Settings</a>
      </nav>
    </div>
  </header>

  <main>
    <section id="dashboard" class="container">
      <div class="card-grid">
        <div class="card">
          <h2>Balance</h2>
          <p class="value" id="balance">0.000 BAT</p>
        </div>
        <div class="card">
          <h2>Earnings This Month</h2>
          <p class="value" id="earnings">0.000 BAT</p>
        </div>
        <div class="card">
          <h2>Ads Viewed</h2>
          <p class="value" id="adsViewed">0</p>
        </div>
        <div class="card">
          <h2>Estimated Payout</h2>
          <p class="value" id="payout">0.000 BAT</p>
        </div>
      </div>
    </section>

    <section id="history" class="container">
      <h2>Recent Activity</h2>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Type</th>
              <th>Amount</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="activityTable">
            <tr>
              <td colspan="4" class="empty">No activity yet</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <section id="settings" class="container">
      <h2>Settings</h2>
      <div class="settings-form">
        <label>
          <span>Auto-Contribute</span>
          <input type="checkbox" id="autoContribute">
        </label>
        <label>
          <span>Show Ads</span>
          <input type="checkbox" id="showAds" checked>
        </label>
        <label>
          <span>Monthly Budget</span>
          <select id="budget">
            <option>1 BAT</option>
            <option>5 BAT</option>
            <option selected>10 BAT</option>
            <option>25 BAT</option>
          </select>
        </label>
        <button id="saveSettings" class="btn">Save Settings</button>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 Brave Rewards Dashboard</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
